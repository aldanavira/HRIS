<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Human Capital Terintegrasi - Yayasan Hasnur Centre</title>
<style>
:root{
  --navy-900:#0a1f44; --navy-800:#102a5c; --navy-700:#1a3a7a; --navy-600:#23488f;
  --navy-500:#2d5aa8; --navy-400:#4a78c4; --navy-300:#7ba0d8;
  --gray-50:#f7f8fa; --gray-100:#eef0f4; --gray-200:#dde1e8; --gray-300:#c4cad6;
  --gray-400:#9aa1b1; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
  --green:#16a34a; --green-bg:#dcfce7; --yellow:#ca8a04; --yellow-bg:#fef9c3;
  --red:#dc2626; --red-bg:#fee2e2; --blue:#2563eb; --blue-bg:#dbeafe;
  --white:#ffffff; --shadow:0 1px 3px rgba(10,31,68,.08),0 1px 2px rgba(10,31,68,.06);
  --shadow-md:0 4px 6px -1px rgba(10,31,68,.1),0 2px 4px -2px rgba(10,31,68,.06);
  --radius:10px; --radius-sm:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--gray-50);color:var(--gray-700);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:264px;background:var(--navy-900);color:#cdd6e6;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;transition:transform .25s ease;display:flex;flex-direction:column}
.sidebar.collapsed{transform:translateX(-264px)}
.sidebar-header{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sidebar-logo{width:36px;height:36px;background:var(--navy-500);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo svg{width:22px;height:22px}
.sidebar-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-sub{font-size:10px;color:#7ba0d8;margin-top:2px}
.nav-group{padding:10px 0}
.nav-group-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#5a7299;padding:8px 20px 4px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;font-size:13px;color:#b8c4d8;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(45,90,168,.25);color:#fff;border-left-color:var(--navy-400)}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.nav-item.hidden{display:none}

.main{flex:1;margin-left:264px;transition:margin .25s ease;display:flex;flex-direction:column;min-height:100vh}
.main.full{margin-left:0}
.topbar{background:#fff;height:60px;display:flex;align-items:center;gap:14px;padding:0 24px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.hamburger{display:none;width:36px;height:36px;border-radius:var(--radius-sm);align-items:center;justify-content:center}
.hamburger:hover{background:var(--gray-100)}
.hamburger svg{width:22px;height:22px}
.breadcrumb{font-size:13px;color:var(--gray-500);flex:1}
.breadcrumb b{color:var(--navy-800)}
.breadcrumb .sep{margin:0 6px;color:var(--gray-300)}
.role-switcher{position:relative}
.role-btn{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--gray-100);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--navy-800)}
.role-btn:hover{background:var(--gray-200)}
.role-btn svg{width:16px;height:16px}
.role-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);min-width:200px;display:none;z-index:60}
.role-dropdown.open{display:block}
.role-option{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm)}
.role-option:hover{background:var(--gray-50)}
.role-option.selected{background:var(--blue-bg);color:var(--blue);font-weight:600}
.role-option svg{width:16px;height:16px}
.topbar-user{display:flex;align-items:center;gap:8px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-500);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.user-info{font-size:12px;line-height:1.3}
.user-info b{display:block;color:var(--navy-800)}
.user-info span{color:var(--gray-400)}

.content{padding:24px;flex:1}
.section{display:none;animation:fadeIn .2s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.page-title{font-size:20px;font-weight:700;color:var(--navy-900);margin-bottom:4px}
.page-desc{font-size:13px;color:var(--gray-500);margin-bottom:20px}

/* Cards */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--navy-800)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:24px;height:24px}
.kpi-info{flex:1}
.kpi-label{font-size:12px;color:var(--gray-500);margin-bottom:2px}
.kpi-value{font-size:22px;font-weight:700;color:var(--navy-900)}
.kpi-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
.kpi-trend{font-size:11px;font-weight:600}
.kpi-trend.up{color:var(--green)} .kpi-trend.down{color:var(--red)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--gray-50);color:var(--gray-600);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--gray-200);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:var(--gray-50)}
.avatar-sm{width:30px;height:30px;border-radius:50%;background:var(--navy-400);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-right:8px;vertical-align:middle}

/* Forms */
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.form-group{flex:1;min-width:160px}
.form-group label{display:block;font-size:12px;color:var(--gray-600);margin-bottom:5px;font-weight:500}
.input,select{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:#fff;color:var(--gray-700);transition:border .15s}
.input:focus,select:focus{outline:none;border-color:var(--navy-400);box-shadow:0 0 0 3px rgba(45,90,168,.1)}
.btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--navy-600);color:#fff}
.btn-primary:hover{background:var(--navy-700)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{filter:brightness(.92)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{filter:brightness(.92)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(10,31,68,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:720px;box-shadow:var(--shadow-md);margin-bottom:40px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100)}
.modal-title{font-size:16px;font-weight:600;color:var(--navy-800)}
.modal-close{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--gray-100)}
.modal-close svg{width:18px;height:18px}
.modal-body{padding:20px;max-height:65vh;overflow-y:auto}
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--gray-200);margin:-20px -20px 16px;flex-wrap:wrap}
.modal-tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent}
.modal-tab.active{color:var(--navy-600);border-bottom-color:var(--navy-600);font-weight:600}
.modal-tab:hover{color:var(--navy-600)}
.tab-content{display:none}
.tab-content.active{display:block}
.detail-grid{display:grid;grid-template-columns:140px 1fr;gap:8px 16px;font-size:13px}
.detail-grid dt{color:var(--gray-500)}
.detail-grid dd{color:var(--gray-700);font-weight:500}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--gray-200);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.tab.active{color:var(--navy-600);border-bottom-color:var(--navy-600);font-weight:600}
.tab:hover{color:var(--navy-600);background:var(--gray-50)}

/* Notification list */
.notif-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:1px solid var(--gray-100);margin-bottom:8px}
.notif-item:hover{background:var(--gray-50);border-color:var(--gray-200)}
.notif-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon svg{width:18px;height:18px}
.notif-content{flex:1}
.notif-title{font-size:13px;font-weight:600;color:var(--navy-800)}
.notif-desc{font-size:12px;color:var(--gray-500)}

/* Folder grid */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.folder-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s}
.folder-card:hover{box-shadow:var(--shadow-md);border-color:var(--navy-300);transform:translateY(-2px)}
.folder-icon{width:48px;height:48px;margin:0 auto 10px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.folder-icon svg{width:26px;height:26px}
.folder-name{font-size:13px;font-weight:600;color:var(--navy-800)}
.folder-count{font-size:11px;color:var(--gray-400);margin-top:2px}

/* Nine-box */
.nine-box{display:grid;grid-template-columns:60px 1fr 1fr 1fr;grid-template-rows:40px 1fr 1fr 1fr;gap:6px;max-width:680px}
.nine-axis-y{writing-mode:vertical-rl;transform:rotate(180deg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gray-500);text-align:center}
.nine-axis-x{grid-column:2/5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gray-500)}
.nine-cell{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px;min-height:90px;display:flex;flex-direction:column;gap:4px}
.nine-cell-label{font-size:10px;color:var(--gray-400);font-weight:600}
.nine-avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nine-cell.high{background:var(--green-bg);border-color:var(--green)}
.nine-cell.med{background:var(--yellow-bg);border-color:var(--yellow)}
.nine-cell.low{background:var(--red-bg);border-color:var(--red)}

/* Org chart */
.org-tree{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.org-node{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 16px;text-align:center;min-width:160px;box-shadow:var(--shadow);position:relative}
.org-node.vacant{border:2px dashed var(--gray-300);background:var(--gray-50)}
.org-node-title{font-size:13px;font-weight:600;color:var(--navy-800)}
.org-node-name{font-size:11px;color:var(--gray-500);margin-top:2px}
.org-children{display:flex;gap:20px;position:relative;margin-top:24px}
.org-children::before{content:'';position:absolute;top:-24px;left:50%;width:1px;height:24px;background:var(--gray-300)}
.org-child-wrap{position:relative}
.org-child-wrap::before{content:'';position:absolute;top:-24px;left:0;width:100%;height:24px;border-left:1px solid var(--gray-300);border-right:1px solid var(--gray-300);border-top:1px solid var(--gray-300)}
.org-child-wrap:first-child::before{left:50%;border-left:none}
.org-child-wrap:last-child::before{right:50%;border-right:none}
.org-level{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kanban-col{background:var(--gray-50);border-radius:var(--radius);padding:12px;min-height:200px}
.kanban-col-header{font-size:13px;font-weight:600;color:var(--navy-800);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.kanban-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:var(--shadow)}
.kanban-card-name{font-size:13px;font-weight:600;color:var(--navy-800)}
.kanban-card-pos{font-size:11px;color:var(--gray-500);margin:2px 0 8px}

/* Progress */
.progress{height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .3s}

/* Gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center}
.gauge{position:relative;width:180px;height:100px}
.gauge svg{width:100%;height:100%}
.gauge-value{position:absolute;bottom:0;left:50%;transform:translateX(-50%);text-align:center}
.gauge-value b{font-size:28px;font-weight:700;color:var(--navy-900);display:block}
.gauge-value span{font-size:11px;color:var(--gray-500)}

/* Accordion */
.accordion-item{border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
.accordion-header{padding:12px 16px;background:var(--gray-50);font-size:13px;font-weight:600;color:var(--navy-800);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.accordion-header svg{width:16px;height:16px;transition:transform .2s}
.accordion-item.open .accordion-header svg{transform:rotate(180deg)}
.accordion-body{padding:0 16px;max-height:0;overflow:hidden;transition:all .2s}
.accordion-item.open .accordion-body{padding:12px 16px;max-height:500px}

/* Handbook */
.handbook{display:grid;grid-template-columns:220px 1fr;gap:20px}
.toc-item{padding:8px 12px;font-size:13px;color:var(--gray-600);cursor:pointer;border-radius:var(--radius-sm);border-left:3px solid transparent}
.toc-item:hover{background:var(--gray-50)}
.toc-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.handbook-content{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);min-height:400px}
.handbook-content h3{font-size:18px;color:var(--navy-800);margin-bottom:12px}
.handbook-content p{font-size:14px;color:var(--gray-600);margin-bottom:12px;line-height:1.7}

/* Leaderboard */
.leaderboard-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--radius-sm)}
.leaderboard-item:nth-child(1){background:#fef9c3}
.leaderboard-item:nth-child(2){background:var(--gray-100)}
.leaderboard-item:nth-child(3){background:#fed7aa}
.lb-rank{width:28px;height:28px;border-radius:50%;background:var(--navy-600);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.lb-info{flex:1}
.lb-name{font-size:13px;font-weight:600;color:var(--navy-800)}
.lb-val{font-size:12px;color:var(--gray-500)}
.lb-bar{width:80px;height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden}
.lb-bar-fill{height:100%;background:var(--green);border-radius:3px}

/* Access restricted */
.access-restricted{text-align:center;padding:60px 20px}
.access-restricted svg{width:64px;height:64px;color:var(--gray-300);margin-bottom:16px}
.access-restricted h3{font-size:18px;color:var(--navy-800);margin-bottom:8px}
.access-restricted p{color:var(--gray-500);max-width:400px;margin:0 auto}

/* Responsive */
@media(max-width:1024px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .kanban{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-264px)}
  .sidebar.collapsed{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .grid-2{grid-template-columns:1fr}
  .handbook{grid-template-columns:1fr}
  .kanban{grid-template-columns:1fr}
  .topbar-user .user-info{display:none}
  .content{padding:16px}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>
      </div>
      <div>
        <div class="sidebar-title">Hasnur Centre</div>
        <div class="sidebar-sub">Human Capital System</div>
      </div>
    </div>
    <nav id="navMenu"></nav>
  </aside>

  <!-- MAIN -->
  <div class="main" id="main">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <div class="breadcrumb" id="breadcrumb">Dashboard / <b>Overview</b></div>
      <div class="role-switcher">
        <button class="role-btn" onclick="toggleRoleDropdown()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span id="roleLabel">Super Admin</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="role-dropdown" id="roleDropdown">
          <div class="role-option selected" onclick="switchRole('superadmin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>Super Admin</div>
          <div class="role-option" onclick="switchRole('hc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7L9 18l-5-5"/></svg>Tim HC</div>
          <div class="role-option" onclick="switchRole('pic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7L9 18l-5-5"/></svg>PIC Unit Kerja</div>
          <div class="role-option" onclick="switchRole('employee')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>Employee (ESS)</div>
        </div>
      </div>

// ============ NAVIGATION RENDER ============
function renderNav(){
  var nav=document.getElementById("navMenu");
  nav.innerHTML="";
  NAV_CONFIG.forEach(function(g){
    var gl=document.createElement("div");
    gl.className="nav-group-label";
    gl.textContent=g.group;
    nav.appendChild(gl);
    g.items.forEach(function(it){
      if(it.roles.indexOf(currentRole)===-1)return;
      var el=document.createElement("div");
      el.className="nav-item"+(it.id===currentSection?" active":"");
      el.setAttribute("data-section",it.id);
      el.innerHTML=svgIcon(it.icon)+'<span>'+it.label+'</span>';
      el.onclick=function(){navigateTo(it.id);};
      nav.appendChild(el);
    });
  });
}

function navigateTo(section){
  currentSection=section;
  renderNav();
  renderSection(section);
  updateBreadcrumb(section);
  if(window.innerWidth<=768)closeSidebar();
  document.getElementById("content").scrollTop=0;

// SVG Bar Chart
function barChartSVG(data){
  var max=Math.max.apply(null,data.map(function(d){return d.val;}));
  var w=480,h=200,pad=30,bw=40,gap=(w-pad*2-bw*data.length)/(data.length-1);
  var h2='';
  h2+='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:200px">';
  // grid lines
  for(var i=0;i<=4;i++){
    var y=h-pad-(h-pad*2)*i/4;
    h2+='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="#eef0f4" stroke-width="1"/>';
    h2+='<text x="'+(pad-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#9aa1b1">'+Math.round(max*i/4)+'</text>';
  }
  data.forEach(function(d,i){
    var x=pad+i*(bw+gap);
    var bh=(h-pad*2)*(d.val/max);
    var y=h-pad-bh;
    h2+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="#2d5aa8"/>';
    h2+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">'+d.val+'</text>';
    h2+='<text x="'+(x+bw/2)+'" y="'+(h-10)+'" text-anchor="middle" font-size="9" fill="#6b7280">'+d.label.substring(0,8)+'</text>';
  });
  h2+='</svg>';
  return h2;
}

// SVG Donut Chart
function donutSVG(data){
  var total=data.reduce(function(s,d){return s+d.val;},0);
  var cx=100,cy=100,r=70,r2=45;
  var h2='<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">';
  h2+='<svg viewBox="0 0 200 200" style="width:180px;height:180px">';
  var angle=-90;
  data.forEach(function(d){
    var pct=d.val/total;
    var sweep=pct*360;
    var rad=(angle+sweep/2)*Math.PI/180;
    var x1=cx+r*Math.cos(angle*Math.PI/180);
    var y1=cy+r*Math.sin(angle*Math.PI/180);
    var x2=cx+r*Math.cos((angle+sweep)*Math.PI/180);
    var y2=cy+r*Math.sin((angle+sweep)*Math.PI/180);
    var large=sweep>180?1:0;
    var xi1=cx+r2*Math.cos(angle*Math.PI/180);
    var yi1=cy+r2*Math.sin(angle*Math.PI/180);
    var xi2=cx+r2*Math.cos((angle+sweep)*Math.PI/180);
    var yi2=cy+r2*Math.sin((angle+sweep)*Math.PI/180);
    h2+='<path d="M'+x1+' '+y1+' A'+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L'+xi2+' '+yi2+' A'+r2+' '+r2+' 0 '+large+' 0 '+xi1+' '+yi1+' Z" fill="'+d.color+'"/>';
    angle+=sweep;
  });
  h2+='<text x="100" y="95" text-anchor="middle" font-size="22" font-weight="700" fill="#0a1f44">'+total+'</text>';
  h2+='<text x="100" y="112" text-anchor="middle" font-size="10" fill="#9aa1b1">Total</text>';
  h2+='</svg>';
  h2+='<div>';
  data.forEach(function(d){
    h2+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:12px;height:12px;border-radius:3px;background:'+d.color+';display:inline-block"></span><span style="font-size:13px;color:#374151">'+d.label+': <b>'+d.val+'</b> ('+Math.round(d.val/total*100)+'%)</span></div>';
  });
  h2+='</div></div>';
  return h2;
}

// SVG Line Chart
function lineChartSVG(data,labels){
  var w=520,h=200,pad=30;
  var max=Math.max.apply(null,data)*1.15;
  var min=Math.min.apply(null,data)*0.85;
  var h2='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:200px">';
  for(var i=0;i<=4;i++){
    var y=h-pad-(h-pad*2)*i/4;
    h2+='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="#eef0f4"/>';
    h2+='<text x="'+(pad-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#9aa1b1">'+Math.round(min+(max-min)*i/4)+'</text>';
  }
  var pts=data.map(function(v,i){
    var x=pad+(w-pad*2)*i/(data.length-1);
    var y=h-pad-(h-pad*2)*(v-min)/(max-min);
    return {x:x,y:y};
  });
  var path=pts.map(function(p,i){return (i===0?"M":"L")+p.x+' '+p.y;}).join(" ");
  h2+='<path d="'+path+'" fill="none" stroke="#2d5aa8" stroke-width="2.5"/>';
  h2+='<path d="'+path+' L'+pts[pts.length-1].x+' '+(h-pad)+' L'+pts[0].x+' '+(h-pad)+' Z" fill="rgba(45,90,168,.1)"/>';
  pts.forEach(function(p,i){
    h2+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3.5" fill="#fff" stroke="#2d5aa8" stroke-width="2"/>';
    h2+='<text x="'+p.x+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="#6b7280">'+labels[i]+'</text>';
  });
  h2+='</svg>';
  return h2;
}

// SVG Radar Chart
function radarSVG(labels,values){
  var cx=120,cy=120,r=80;
  var n=labels.length;
  var h2='<svg viewBox="0 0 240 240" style="width:240px;height:240px">';
  for(var ring=1;ring<=4;ring++){
    var rr=r*ring/4;
    var pts=[];
    for(var i=0;i<n;i++){
      var a=-Math.PI/2+i*2*Math.PI/n;
      pts.push((cx+rr*Math.cos(a))+','+(cy+rr*Math.sin(a)));
    }
    h2+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#eef0f4"/>';
  }
  for(var i=0;i<n;i++){
    var a=-Math.PI/2+i*2*Math.PI/n;
    h2+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#eef0f4"/>';
    h2+='<text x="'+(cx+(r+12)*Math.cos(a))+'" y="'+(cy+(r+12)*Math.sin(a)+3)+'" text-anchor="middle" font-size="9" fill="#6b7280">'+labels[i]+'</text>';
  }
  var dataPts=values.map(function(v,i){
    var a=-Math.PI/2+i*2*Math.PI/n;
    var rr=r*v/100;
    return (cx+rr*Math.cos(a))+','+(cy+rr*Math.sin(a));
  });
  h2+='<polygon points="'+dataPts.join(' ')+'" fill="rgba(45,90,168,.2)" stroke="#2d5aa8" stroke-width="2"/>';
  values.forEach(function(v,i){
    var a=-Math.PI/2+i*2*Math.PI/n;
    var rr=r*v/100;
    h2+='<circle cx="'+(cx+rr*Math.cos(a))+'" cy="'+(cy+rr*Math.sin(a))+'" r="3" fill="#2d5aa8"/>';
  });
  h2+='</svg>';
  return h2;
}

// SVG Gauge
function gaugeSVG(pct){
  var cx=90,cy=90,r=70;
  var start=-Math.PI,end=0;
  var sweep=pct/100*Math.PI;
  var x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
  var x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
  var xi=cx+r*Math.cos(start+sweep),yi=cy+r*Math.sin(start+sweep);
  var color=pct>=95?"#16a34a":pct>=80?"#ca8a04":"#dc2626";
  var h2='<svg viewBox="0 0 180 110" style="width:180px;height:100px">';
  h2+='<path d="M'+x1+' '+y1+' A'+r+' '+r+' 0 0 1 '+x2+' '+y2+'" fill="none" stroke="#eef0f4" stroke-width="14" stroke-linecap="round"/>';
  h2+='<path d="M'+x1+' '+y1+' A'+r+' '+r+' 0 0 1 '+xi+' '+yi+'" fill="none" stroke="'+color+'" stroke-width="14" stroke-linecap="round"/>';
  h2+='</svg>';
  return '<div class="gauge-wrap"><div class="gauge">'+h2+'<div class="gauge-value"><b>'+pct+'%</b><span>Tingkat Kehadiran</span></div></div></div>';
}

function filterEmployees(){
  var s=(document.getElementById("empSearch")?document.getElementById("empSearch").value:"").toLowerCase();
  var u=document.getElementById("filterUnit")?document.getElementById("filterUnit").value:"";
  var a=document.getElementById("filterArea")?document.getElementById("filterArea").value:"";
  var j=document.getElementById("filterJab")?document.getElementById("filterJab").value:"";
  var jp=document.getElementById("filterJenis")?document.getElementById("filterJenis").value:"";
  var filtered=EMPLOYEES.filter(function(e){
    if(s&&e.nama.toLowerCase().indexOf(s)===-1&&e.nrp.toLowerCase().indexOf(s)===-1)return false;
    if(u&&e.unit!==u)return false;
    if(a&&e.area!==a)return false;
    if(j&&e.jabatan!==j)return false;
    if(jp&&e.jenis!==jp)return false;
    return true;
  });
  var tb=document.getElementById("empTbody");
  if(filtered.length===0){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#9aa1b1;padding:24px">Tidak ada data ditemukan</td></tr>';return;}
  var h='';
  filtered.forEach(function(e){
    var stBadge=e.status==="aktif"?'<span class="badge badge-green">Aktif</span>':'<span class="badge badge-gray">Nonaktif</span>';
    var jpBadge=e.jenis==="PKWTT"?'<span class="badge badge-blue">PKWTT</span>':'<span class="badge badge-yellow">PKWT</span>';
    var aksi='';
    if(can("update"))aksi+='<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showEditEmpForm('+e.id+')">Edit</button> ';
    if(can("delete"))aksi+='<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteEmp('+e.id+')">Hapus</button>';
    h+='<tr class="clickable" onclick="showEmpDetail('+e.id+')">';
    h+='<td><span class="avatar-sm">'+initials(e.nama)+'</span>'+e.nama+'</td>';
    h+='<td>'+e.nrp+'</td><td>'+e.unit+'</td><td>'+e.area+'</td><td>'+e.jabatan+'</td><td>'+stBadge+'</td><td>'+jpBadge+'</td>';
    if(aksi)h+='<td style="white-space:nowrap">'+aksi+'</td>';
    h+='</tr>';
  });
  tb.innerHTML=h;
}

function submitAddEmp(){
  var nama=document.getElementById("addNama").value.trim();

  var newId=EMPLOYEES.length+1;
  var tglMasuk=document.getElementById("addMasuk").value;
  EMPLOYEES.push({
    id:newId,nama:nama,

    unit:document.getElementById("addUnit").value,
    area:document.getElementById("addArea").value,

    alamat:document.getElementById("addAlamat").value||"-",
    gaji:parseInt(document.getElementById("addGaji").value)||3000000,

    tunjMakan:parseInt(document.getElementById("addTunjMakan").value)||0,
    tunjTransport:parseInt(document.getElementById("addTunjTransport").value)||0,
    statusKawin:document.getElementById("addKawin").value,
    anak:parseInt(document.getElementById("addAnak").value)||0,

  var e=EMPLOYEES.filter(function(x){return x.id===id;})[0];

function stackedBarSVG(){
  var w=480,h=200,pad=30,bw=40;
  var data=UNITS.map(function(u){
    var pkwt=EMPLOYEES.filter(function(e){return e.unit===u&&e.jenis==="PKWT";}).length;
    var pkwtt=EMPLOYEES.filter(function(e){return e.unit===u&&e.jenis==="PKWTT";}).length;
    return {label:u,pkwt:pkwt,pkwtt:pkwtt,total:pkwt+pkwtt};
  });
  var max=Math.max.apply(null,data.map(function(d){return d.total;}))||1;
  var gap=(w-pad*2-bw*data.length)/(data.length-1);
  var h2='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:200px">';
  for(var i=0;i<=4;i++){
    var y=h-pad-(h-pad*2)*i/4;
    h2+='<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="#eef0f4"/>';
    h2+='<text x="'+(pad-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#9aa1b1">'+Math.round(max*i/4)+'</text>';
  }
  data.forEach(function(d,i){
    var x=pad+i*(bw+gap);
    var bh1=(h-pad*2)*(d.pkwtt/max);
    var bh2=(h-pad*2)*(d.pkwt/max);
    h2+='<rect x="'+x+'" y="'+(h-pad-bh1)+'" width="'+bw+'" height="'+bh1+'" rx="3" fill="#2d5aa8"/>';
    h2+='<rect x="'+x+'" y="'+(h-pad-bh1-bh2)+'" width="'+bw+'" height="'+bh2+'" fill="#7ba0d8"/>';
    h2+='<text x="'+(x+bw/2)+'" y="'+(h-10)+'" text-anchor="middle" font-size="8" fill="#6b7280">'+d.label.substring(0,6)+'</text>';
  });
  h2+='<rect x="'+(w-100)+'" y="10" width="10" height="10" fill="#2d5aa8"/><text x="'+(w-85)+'" y="19" font-size="10" fill="#374151">PKWTT</text>';
  h2+='<rect x="'+(w-50)+'" y="10" width="10" height="10" fill="#7ba0d8"/><text x="'+(w-35)+'" y="19" font-size="10" fill="#374151">PKWT</text>';
  h2+='</svg>';
  return h2;
}

RENDERERS.turnover=function(c){
  var months=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
  var totalEmp=EMPLOYEES.length;
  var resigned=EMPLOYEES.filter(function(e){return e.status==="nonaktif";});
  var resignCount=resigned.length;
  var activeCount=totalEmp-resignCount;
  var turnoverRate=totalEmp>0?((resignCount/totalEmp)*100).toFixed(1):"0.0";
  var newHires=EMPLOYEES.filter(function(e){return e.tglMasuk&&e.tglMasuk>="2026-01-01";}).length;
  var unitStats=UNITS.map(function(u){
    var tot=EMPLOYEES.filter(function(e){return e.unit===u;}).length;
    var res=EMPLOYEES.filter(function(e){return e.unit===u&&e.status==="nonaktif";}).length;
    var rate=tot>0?((res/tot)*100).toFixed(1):"0.0";
    return {unit:u,total:tot,resigned:res,rate:parseFloat(rate)};
  });
  var tData=months.map(function(m,i){
    var base=parseFloat(turnoverRate);
    return parseFloat((base+(Math.sin(i)*0.8)-0.3).toFixed(1));
  });
  var h='<div class="page-title">Dashboard Turnover</div><div class="page-desc">Analisis pergerakan karyawan keluar-masuk organisasi (berdasarkan data karyawan real)'+roleBadge()+'</div>';
  h+='<div class="kpi-grid">';
  h+=kpiCard("trending",turnoverRate+"%","Turnover Rate",""+resignCount+" dari "+totalEmp+" karyawan","var(--red)","var(--red-bg)","down");
  h+=kpiCard("users",""+activeCount,"Karyawan Aktif","Dari total "+totalEmp,"var(--green)","var(--green-bg)","up");
  h+=kpiCard("user",""+newHires,"Karyawan Baru","Masuk tahun 2026","var(--blue)","var(--blue-bg)","up");
  h+=kpiCard("alert",""+resignCount,"Total Resign","Berdasarkan status kepegawaian","var(--red)","var(--red-bg)","down");
  h+='</div>';
  // Action buttons
  h+='<div style="display:flex;gap:8px;margin:16px 0;flex-wrap:wrap">';
  if(can("create"))h+='<button class="btn btn-primary btn-sm" onclick="showAddTurnoverForm()">'+svgIcon("user")+' Input Karyawan Resign</button>';
  if(can("create"))h+='<button class="btn btn-primary btn-sm" onclick="showAddHireForm()">'+svgIcon("user")+' Input Karyawan Baru</button>';
  if(can("export"))h+='<button class="btn btn-secondary btn-sm" onclick="exportTurnover()">'+svgIcon("download")+' Export Data Turnover</button>';
  h+='</div>';
  h+='<div class="grid-2">';
  h+='<div class="card"><div class="card-header"><div class="card-title">Tren Turnover 12 Bulan</div></div>'+lineChartSVG(tData,months)+'</div>';
  h+='<div class="card"><div class="card-header"><div class="card-title">Alasan Resign</div></div>';
  var alasanStats=ALASAN_RESIGN.map(function(a){
    var cnt=TURNOVER_DATA.filter(function(t){return t.alasan===a;}).length;
    return {label:a,val:cnt,color:"#dc2626"};
  }).filter(function(x){return x.val>0;});
  if(alasanStats.length>0){
    h+=donutSVG(alasanStats);
  }else{
    h+='<p style="color:#9aa1b1;text-align:center;padding:40px 0">Belum ada data alasan resign</p>';
  }
  h+='</div></div>';
  h+='<div class="card"><div class="card-header"><div class="card-title">Breakdown Turnover per Unit Kerja</div></div>';
  h+='<div class="table-wrap"><table><thead><tr><th>Unit Kerja</th><th>Total Karyawan</th><th>Resign (Nonaktif)</th><th>Turnover Rate</th></tr></thead><tbody>';
  unitStats.forEach(function(s){
    h+='<tr><td>'+s.unit+'</td><td>'+s.total+'</td><td>'+s.resigned+'</td><td><span class="badge '+(s.rate>10?"badge-red":"badge-green")+'">'+s.rate+'%</span></td></tr>';
  });
  h+='</tbody></table></div></div>';
  if(resigned.length>0){
    h+='<div class="card"><div class="card-header"><div class="card-title">Daftar Karyawan Nonaktif (Resign)</div></div>';
    h+='<div class="table-wrap"><table><thead><tr><th>Nama</th><th>NRP</th><th>Unit Kerja</th><th>Jabatan</th><th>Tgl Keluar</th><th>Alasan</th>'+(can("delete")?'<th>Aksi</th>':'')+'</tr></thead><tbody>';
    resigned.forEach(function(e){
      h+='<tr><td><span class="avatar-sm">'+initials(e.nama)+'</span>'+e.nama+'</td><td>'+e.nrp+'</td><td>'+e.unit+'</td><td>'+e.jabatan+'</td><td>'+(e.tglKeluar||"-")+'</td><td>'+(e.alasanKeluar||"-")+'</td>'+(can("delete")?'<td><button class="btn btn-danger btn-sm" onclick="reactivateEmp('+e.id+')">Reaktifkan</button></td>':'')+'</tr>';
    });
    h+='</tbody></table></div></div>';
  }
  c.innerHTML=h;
};

function switchAbsensiTab(el,period){

  renderAbsensiTable(period);
}

function renderAbsensiTable(period){
  var mult=period==="harian"?1:period==="mingguan"?5:22;
  var h='';
  ATTENDANCE.forEach(function(a){
    var masuk=period==="harian"?(Math.random()>.1?"08:0"+Math.floor(Math.random()*9):"Terlambat"):(a.hadir*mult/22).toFixed(0)+" hari";
    var aksi=can("update")?'<td><button class="btn btn-secondary btn-sm" onclick="showEditAbsensiForm('+a.emp.id+')">Edit</button></td>':'';h+='<tr><td><span class="avatar-sm">'+initials(a.emp.nama)+'</span>'+a.emp.nama+'</td><td>'+masuk+'</td><td>'+(a.terlambat>0?'<span class="badge badge-yellow">'+a.terlambat+'</span>':'-')+'</td><td>'+(Math.random()>.8?'1':'-')+'</td><td>'+a.izin+'</td><td>'+(Math.random()>.7?'1':'-')+'</td><td>'+(Math.random()>.8?'1':'-')+'</td><td>'+a.sakit+'</td><td>'+(a.alpa>0?'<span class="badge badge-red">'+a.alpa+'</span>':'-')+'</td><td>'+(a.wfh>0?a.wfh:'-')+'</td>'+aksi+'</tr>';
  });
  var tb=document.getElementById("absTbody");
  if(tb)tb.innerHTML=h;
}

function renderCalcTable(){
  var h='';
  ATTENDANCE.forEach(function(a){
    var transport=a.hadir*25000;
    var makan=a.hadir*30000;
    var potTerlambat=a.terlambat*15000;
    var potAbsen=a.alpa*50000;
    var total=transport+makan-potTerlambat-potAbsen;
    h+='<tr><td><span class="avatar-sm">'+initials(a.emp.nama)+'</span>'+a.emp.nama+'</td><td>'+a.hadir+'</td><td>Rp '+transport.toLocaleString("id-ID")+'</td><td>Rp '+makan.toLocaleString("id-ID")+'</td><td>Rp '+potTerlambat.toLocaleString("id-ID")+'</td><td>Rp '+potAbsen.toLocaleString("id-ID")+'</td><td><b>Rp '+total.toLocaleString("id-ID")+'</b></td></tr>';
  });
  var tb=document.getElementById("calcTbody");
  if(tb)tb.innerHTML=h;
}

function hitungPensiun(){
  var nama=document.getElementById("simNama").value;
  var masuk=new Date(document.getElementById("simMasuk").value);
  var now=new Date(document.getElementById("simNow").value);
  var gaji=parseInt(document.getElementById("simGaji").value)||0;
  var tunj=parseInt(document.getElementById("simTunjangan").value)||0;
  var years=(now-masuk)/(365.25*24*3600*1000);
  var masaKerja=Math.floor(years);
  var usiaPensiun=60;
  var sisaTahun=usiaPensiun-35;
  // Estimasi
  var upah=gaji+tunj;
  var pensiun=Math.round(upah*masaKerja*0.02*12);
  var pesangon=Math.round(upah* (masaKerja>=8?8:masaKerja));
  var pmk=Math.round(gaji*masaKerja*0.5);
  var uph=Math.round(upah* (masaKerja>=1?1:0)+tunj*masaKerja);
  var h='<div class="card-header"><div class="card-title">Hasil Perhitungan - '+nama+'</div></div>';
  h+='<div class="detail-grid" style="margin-top:12px">';
  h+=dl("Masa Kerja",masaKerja+" tahun");
  h+=dl("Estimasi Usia Pensiun","60 tahun");
  h+=dl("Sisa Waktu Kerja",Math.max(0,60-35-masaKerja)+" tahun");
  h+=dl("Upah Dasar","Rp "+upah.toLocaleString("id-ID"));
  h+='</div>';
  h+='<hr style="border:none;border-top:1px solid #eef0f4;margin:16px 0">';
  h+='<div style="display:flex;flex-direction:column;gap:10px">';
  h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--green-bg);border-radius:6px"><span>Estimasi Pensiun</span><b style="color:var(--green)">Rp '+pensiun.toLocaleString("id-ID")+'</b></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--blue-bg);border-radius:6px"><span>Estimasi Pesangon</span><b style="color:var(--blue)">Rp '+pesangon.toLocaleString("id-ID")+'</b></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--yellow-bg);border-radius:6px"><span>Penghargaan Masa Kerja</span><b style="color:var(--yellow)">Rp '+pmk.toLocaleString("id-ID")+'</b></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--gray-100);border-radius:6px"><span>Uang Penggantian Hak</span><b>Rp '+uph.toLocaleString("id-ID")+'</b></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:12px;background:var(--navy-600);color:#fff;border-radius:6px;margin-top:4px"><span style="font-weight:600">Total Estimasi</span><b style="font-size:16px">Rp '+(pensiun+pesangon+pmk+uph).toLocaleString("id-ID")+'</b></div>';
  h+='</div>';
  h+='<p style="font-size:11px;color:#9aa1b1;margin-top:12px">* Hasil simulasi bersifat estimasi. Perhitungan resmi mengacu pada UU Ketenagakerjaan dan kebijakan internal yayasan.</p>';
  document.getElementById("pensiunResult").innerHTML=h;
}

function renderWorkflows(){
  var h='';
  WORKFLOWS.forEach(function(w){
    var badge=w.status==="Approved"?"badge-green":w.status==="Rejected"?"badge-red":"badge-yellow";
    var aksi='';
    if(w.status==="Pending"&&can("approve")){
      aksi='<button class="btn btn-success btn-sm" onclick="approveWorkflow('+w.id+',true)">Approve</button> <button class="btn btn-danger btn-sm" onclick="approveWorkflow('+w.id+',false)">Reject</button>';
    }else{
      aksi='<button class="btn btn-secondary btn-sm" onclick="showWorkflowDetail('+w.id+')">Detail</button>';
    }
    if(can("delete"))aksi+=' <button class="btn btn-danger btn-sm" onclick="deleteWorkflow('+w.id+')">Hapus</button>';
    h+='<tr id="wfRow-'+w.id+'"><td><span class="badge badge-blue">'+w.jenis+'</span></td><td>'+w.nama+'</td><td>'+w.pos+'</td><td>'+w.tanggal+'</td><td>'+w.approver+'</td><td><span class="badge '+badge+'" id="wfStatus-'+w.id+'">'+w.status+'</span></td><td id="wfAksi-'+w.id+'">'+aksi+'</td></tr>';
  });
  var tb=document.getElementById("workflowTbody");
  if(tb)tb.innerHTML=h;
}

function approveWorkflow(id,approve){
  var w=WORKFLOWS.filter(function(x){return x.id===id;})[0];
  if(!w)return;
  w.status=approve?"Approved":"Rejected";
  var badge=w.status==="Approved"?"badge-green":"badge-red";
  var statusEl=document.getElementById("wfStatus-"+id);
  statusEl.className="badge "+badge;
  statusEl.textContent=w.status;
  document.getElementById("wfAksi-"+id).innerHTML='<button class="btn btn-secondary btn-sm" onclick="showWorkflowDetail('+id+')">Detail</button>';
  alert("Pengajuan "+w.jenis+" - "+w.nama+" telah "+(approve?"DISETUJUI":"DITOLAK"));
}
function deleteWorkflow(id){
  var w=WORKFLOWS.filter(function(x){return x.id===id;})[0];
  if(!w)return;
  if(!confirm("Yakin hapus pengajuan: "+w.jenis+" - "+w.nama+"?"))return;
  WORKFLOWS=WORKFLOWS.filter(function(x){return x.id!==id;});
  renderWorkflows();
  alert("Pengajuan dihapus");
}

function showAddRecruitForm(){
  var h='<div class="form-group" style="margin-bottom:12px"><label>Nama Kandidat</label><input class="input" id="recNama" placeholder="Nama"></div>';
  h+='<div class="form-group" style="margin-bottom:12px"><label>Posisi Dilamar</label><input class="input" id="recPos" placeholder="Posisi"></div>';
  h+='<button class="btn btn-primary btn-block" onclick="submitAddRecruit()">Tambah Kandidat</button>';
  openModal("Tambah Kandidat Baru",h);
}

function submitAddRecruit(){
  var nama=document.getElementById("recNama").value;
  var pos=document.getElementById("recPos").value||"-";
  if(!nama){alert("Nama wajib diisi");return;}
  RECRUITS.push({id:Date.now(),nama:nama,pos:pos,stage:"Screening"});
  closeModal();
  renderKanban();
  alert("Kandidat ditambahkan: "+nama);
}

function deleteRecruit(id){
  if(!confirm("Hapus kandidat ini?"))return;
  RECRUITS=RECRUITS.filter(function(x){return x.id!==id;});
  renderKanban();
}
function renderKanban(){
  var stages=["Screening","Interview","Offer","Hired"];
  var h='';
  stages.forEach(function(s){
    var items=RECRUITS.filter(function(r){return r.stage===s;});
    h+='<div class="kanban-col"><div class="kanban-col-header">'+s+' <span class="badge badge-gray">'+items.length+'</span></div>';
    items.forEach(function(r){
      var nextIdx=stages.indexOf(r.stage)+1;
      var nextBtn=nextIdx<stages.length?'<button class="btn btn-primary btn-sm btn-block" style="margin-top:6px" onclick="moveKanban('+r.id+',\''+stages[nextIdx]+'\')">Next Stage &rarr;</button>':'<span class="badge badge-green" style="margin-top:6px;display:block;text-align:center">Selesai</span>';
      h+='<div class="kanban-card"><div class="kanban-card-name">'+r.nama+'</div><div class="kanban-card-pos">'+r.pos+'</div>'+nextBtn+'<button class="btn btn-danger btn-sm btn-block" style="margin-top:4px" onclick="deleteRecruit('+r.id+')">Hapus</button></div>';
    });
    h+='</div>';
  });
  var kb=document.getElementById("kanbanBoard");
  if(kb)kb.innerHTML=h;
}

function moveKanban(id,newStage){
  var r=RECRUITS.filter(function(x){return x.id===id;})[0];
  if(!r)return;
  r.stage=newStage;
  renderKanban();
  alert(r.nama+" dipindahkan ke stage: "+newStage);
}

RENDERERS.kebijakan=function(c){
  var h='<div class="page-title">Pusat Informasi Kebijakan & Budaya</div><div class="page-desc">Dokumen kebijakan, pedoman etika, dan budaya organisasi</div>';
  // Dashboard kepatuhan
  var readCount=POLICIES.filter(function(p){return p.read;}).length;
  var pct=Math.round(readCount/POLICIES.length*100);
  h+='<div class="card"><div class="card-header"><div class="card-title">Dashboard Kepatuuhan</div></div>';
  h+='<div style="display:flex;align-items:center;gap:20px;margin-bottom:16px"><div style="flex:1"><div class="progress" style="height:14px"><div class="progress-bar" id="kepatuhanBar" style="width:'+pct+'%;background:'+(pct>=80?"var(--green)":pct>=50?"var(--yellow)":"var(--red)")+'"></div></div></div><div style="font-size:18px;font-weight:700;color:var(--navy-900)" id="kepatuhanPct">'+pct+'%</div></div>';
  h+='<p style="font-size:13px;color:#6b7280">'+readCount+' dari '+POLICIES.length+' kebijakan telah dibaca</p>';
  h+='</div>';
  // Accordion categories
  h+='<div class="card"><div class="card-header"><div class="card-title">Daftar Kebijakan per Kategori</div></div>';
  var cats=["Peraturan & Kebijakan","Pedoman Etika","Budaya Organisasi","Pedoman Penampilan","Orientasi Karyawan Baru"];
  cats.forEach(function(cat){
    var items=POLICIES.filter(function(p){return p.kategori===cat;});
    h+='<div class="accordion-item">';
    h+='<div class="accordion-header" onclick="toggleAccordion(this)"><span>'+cat+' ('+items.length+')</span>'+svgIcon("chevron")+'</div>';
    h+='<div class="accordion-body">';
    items.forEach(function(p){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eef0f4"><span style="display:flex;align-items:center;gap:8px">'+svgIcon("file")+' '+p.judul+'</span><div><button class="btn btn-secondary btn-sm" onclick="readPolicy('+p.id+')">'+(p.read?'<span class="badge badge-green">Sudah Dibaca</span>':'Baca')+'</button></div></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  c.innerHTML=h;
};

function toggleAccordion(el){
  el.parentNode.classList.toggle("open");
}

function readPolicy(id){
  var p=POLICIES.filter(function(x){return x.id===id;})[0];
  if(!p)return;
  if(p.read){alert("Anda sudah membaca: "+p.judul);return;}
  var h='<p style="margin-bottom:12px;color:#6b7280">'+p.judul+'</p>';
  h+='<p style="line-height:1.7;margin-bottom:16px">Dokumen kebijakan ini berisi pedoman dan aturan yang berlaku bagi seluruh karyawan Yayasan Hasnur Centre. Isi dokumen mencakup ketentuan, prosedur, dan konsekuensi yang berlaku.</p>';
  h+='<div style="background:var(--gray-50);padding:14px;border-radius:8px;margin-bottom:16px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="confirmRead" onchange="document.getElementById(\'confirmBtn\').disabled=!this.checked"> <span style="font-size:13px;font-weight:600">Saya Sudah Membaca dan Memahami kebijakan ini</span></label></div>';
  h+='<button class="btn btn-primary btn-block" id="confirmBtn" disabled onclick="confirmReadPolicy('+id+')">Konfirmasi</button>';
  openModal(p.judul,h);
}

function confirmReadPolicy(id){
  var p=POLICIES.filter(function(x){return x.id===id;})[0];
  p.read=true;
  closeModal();
  // Re-render kebijakan page
  renderSection("kebijakan");
  alert("Terima kasih telah membaca: "+p.judul);
}

// S. Digital Employee Handbook
RENDERERS.handbook=function(c){
  var h='<div class="page-title">Digital Employee Handbook</div><div class="page-desc">Panduan digital karyawan Yayasan Hasnur Centre</div>';
  h+='<div class="handbook">';
  h+='<div class="card" style="padding:12px"><div style="font-size:12px;font-weight:600;color:#9aa1b1;text-transform:uppercase;margin-bottom:8px">Daftar Isi</div>';
  HANDBOOK_SECTIONS.forEach(function(s,i){
    h+='<div class="toc-item'+(i===0?" active":"")+'" onclick="showHandbookSection(this,\''+s.id+'\')">'+s.title+'</div>';
  });
  h+='</div>';
  h+='<div class="handbook-content" id="handbookContent"></div>';
  h+='</div>';
  c.innerHTML=h;
  showHandbookSection(document.querySelector(".toc-item"),HANDBOOK_SECTIONS[0].id);
};

function showHandbookSection(el,id){
  if(el){
    el.parentNode.querySelectorAll(".toc-item").forEach(function(t){t.classList.remove("active");});
    el.classList.add("active");
  }else{
    var items=document.querySelectorAll(".toc-item");
    items.forEach(function(t){t.classList.remove("active");});
    var idx=HANDBOOK_SECTIONS.map(function(s){return s.id;}).indexOf(id);
    if(items[idx])items[idx].classList.add("active");
  }
  var s=HANDBOOK_SECTIONS.filter(function(x){return x.id===id;})[0];
  if(!s)return;
  var hc=document.getElementById("handbookContent");
  if(hc)hc.innerHTML="<h3>"+s.title+"</h3><p>"+s.content+"</p><p style='color:#9aa1b1;font-size:12px;margin-top:20px'>Bagian dari Digital Employee Handbook - Yayasan Hasnur Centre</p>";
}
